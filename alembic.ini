# Alembic configuration. The migration scripts live under backend/migrations/
# so that they ship inside the backend workspace; alembic.ini stays at the
# repo root so that `alembic ...` works from any uv invocation.
#
# The database URL is *not* hard-coded here. backend/migrations/env.py reads
# Settings().database_url at runtime, which keeps secrets out of the repo and
# matches the same source of truth used by the application.

[alembic]
script_location = backend/migrations
prepend_sys_path = backend
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
sqlalchemy.url =

[post_write_hooks]
# Run ruff via the venv binary (uv installs ruff into .venv/bin/, but it is
# not always exposed as a console_scripts entry point). The `exec` type
# invokes the executable directly.
hooks = ruff_format,ruff_lint
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_lint.type = exec
ruff_lint.executable = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
