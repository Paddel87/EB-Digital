# EB Digital — nginx tile/geocoding/routing cache (Phase 1 Skelett).
#
# Phase 1 Schritt 1.8: Stub-Konfiguration für `docker compose --profile dev`.
# Cache-Infrastruktur ist eingerichtet; tatsächliche Pass-throughs zu
# MapTiler und TomTom sind auskommentiert und werden in Phase 6 produktiv
# verschaltet (Spike L + Cache-Strategie). Bis dahin antworten alle Routen
# mit 204 No Content — kein API-Budget-Verbrauch in dev (Constraint
# `project-context.md` Abschnitt 6 Performance).

worker_processes auto;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    types {
        application/x-protobuf  pbf;
    }
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log info;

    # Cache-Zone für statische MapTiler-Tiles. 7 Tage TTL aus
    # `project-context.md` Abschnitt 6 Performance. 1 GB Maximalgröße als
    # Phase-1-Default (in Phase 6 lastabhängig nachgezogen).
    proxy_cache_path  /var/cache/nginx/tiles
                      levels=1:2
                      keys_zone=tiles_cache:10m
                      max_size=1g
                      inactive=7d
                      use_temp_path=off;

    # Geocoding-Cache (kleinerer Footprint, Adress→Koordinaten-Antworten).
    proxy_cache_path  /var/cache/nginx/geocoding
                      levels=1:2
                      keys_zone=geocoding_cache:5m
                      max_size=128m
                      inactive=30d
                      use_temp_path=off;

    server {
        listen      80 default_server;
        server_name _;

        # Compose-Healthcheck-Endpunkt.
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"tile-proxy"}';
        }

        # ── MapTiler Vector-Tiles ────────────────────────────────────────
        # Pfad-Schema: /tiles/{z}/{x}/{y}.pbf
        # Phase 1: 204-Stub (siehe Datei-Header). Phase-6-Aktivierung:
        # 1. `MAPTILER_API_KEY` in nginx via Module/Template injizieren
        # 2. Folgende vier Zeilen aktivieren (kommentar entfernen):
        #      proxy_pass https://api.maptiler.com/maps/streets-v2/$1/$2/$3.pbf?key=<key>;
        #      proxy_cache tiles_cache;
        #      proxy_cache_valid 200 7d;
        #      proxy_cache_key "$request_uri";
        # 3. `Cache-Control: public, max-age=604800` zusätzlich setzen.
        location ~ ^/tiles/(\d+)/(\d+)/(\d+)\.pbf$ {
            access_log off;
            return 204;
        }

        # ── MapTiler Geocoding ───────────────────────────────────────────
        # Phase 1: 204-Stub. Phase-6-Aktivierung:
        #   proxy_pass https://api.maptiler.com/geocoding/$1?key=<key>;
        #   proxy_cache geocoding_cache;
        #   proxy_cache_valid 200 30d;
        location ~ ^/geocoding/(.*)$ {
            access_log off;
            return 204;
        }

        # ── TomTom Routing ───────────────────────────────────────────────
        # Phase 1: 204-Stub. Phase-6-Aktivierung:
        #   proxy_pass https://api.tomtom.com/routing/1/calculateRoute/$1?key=<key>;
        #   (Routing wird _nicht_ gecacht, nur passthrough — Verbrauchszähler
        #    im backend/geo-Modul übernimmt Budget-Disziplin.)
        location ~ ^/routing/(.*)$ {
            access_log off;
            return 204;
        }

        # Catch-all
        location / {
            default_type application/json;
            return 404 '{"error":"unknown route"}';
        }
    }
}
