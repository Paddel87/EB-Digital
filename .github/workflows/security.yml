# Security-Workflow für EB Digital (Klasse G).
# Wöchentlich (Sonntag 06:00 UTC) plus on-demand (workflow_dispatch).
# Fokus: Dependency-Audits + statische Backend-Sicherheitsanalyse.
#
# Hinweis: eslint-plugin-security läuft im regulären lint-frontend-Job in ci.yml mit
# (eslint-plugin-security ist Teil der ESLint-Konfiguration, project-context.md
# Abschnitt 7). Hier wird er nicht doppelt ausgeführt.

name: Security

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"
  UV_VERSION: "0.11.0"
  # pnpm-Version wird ausschließlich aus packageManager in package.json gelesen
  # (Single Source of Truth, vermeidet Multi-Version-Konflikt mit pnpm/action-setup).

jobs:
  dep-audit-backend:
    name: Backend · Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5.0.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        run: uv sync --all-extras --frozen
      - name: pip-audit (Schwellenwert high)
        # project-context.md Abschnitt 7: Schwellenwert "high"
        run: uv run pip-audit --strict --vulnerability-service=osv

  dep-audit-frontend:
    name: Frontend · Dependency Audit (pnpm audit)
    runs-on: ubuntu-latest
    # Auditiert in Phase 1 die Root-Devdeps (commitlint). Ab Schritt 1.7 kommen
    # Frontend-Pakete dazu, die dann automatisch mit auditiert werden.
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (Schwellenwert high)
        run: pnpm audit --audit-level=high

  static-security-backend:
    name: Backend · Static Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5.0.0
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync dependencies
        run: uv sync --all-extras --frozen
      - name: bandit
        run: uv run bandit -r backend/eb_digital -c pyproject.toml
