# Pre-Commit-Konfiguration für Python-Projekte.
# Nach .pre-commit-config.yaml ins Repo-Root kopieren.
# Installation: `pip install pre-commit && pre-commit install`
# Lokal ausführen: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4 # TBD: aktuelle Version pinnen
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0 # TBD: aktuelle Version pinnen
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies: [] # TBD: Type-Stubs hier eintragen

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0 # TBD: aktuelle Version pinnen
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
