# Pre-Commit-Konfiguration für TypeScript/Node-Projekte.
# Nach .pre-commit-config.yaml ins Repo-Root kopieren.
# Installation: `pip install pre-commit && pre-commit install`
# Lokal ausführen: `pre-commit run --all-files`
#
# Alternative: husky + lint-staged direkt in package.json. Welcher Weg gewählt
# wird, ist eine Stack-Entscheidung in project-context.md Abschnitt 7.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8  # TBD: aktuelle stabile Version pinnen
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, scss, markdown, yaml]

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: pnpm eslint  # TBD: an Package Manager anpassen (npm/pnpm/yarn)
        language: system
        types_or: [javascript, jsx, ts, tsx]
        require_serial: false
        pass_filenames: true

      - id: tsc
        name: TypeScript type-check
        entry: pnpm tsc --noEmit
        language: system
        types: [ts]
        pass_filenames: false

      - id: vitest-related
        name: Vitest (related tests)
        entry: pnpm vitest related --run
        language: system
        types_or: [ts, tsx]
        pass_filenames: true
