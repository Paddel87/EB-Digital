# Voller CI-Gate-Satz für Python (Klasse M/G).
# Spiegelt die Pflichtkategorien aus CLAUDE.md Abschnitt 15.
# Lokale Pre-Commit-Hooks (templates/pre-commit/python.yaml) führen dieselben
# Checks aus — diese Pipeline ist die unabhängige Diagnoseschicht.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12" # TBD: aus project-context.md Abschnitt 3

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy --strict src/ # TBD: Pfad anpassen

  security:
    name: Security-Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Bandit
        run: bandit -r src/ -c pyproject.toml # TBD: Pfad und Konfig anpassen
      - name: Dependency audit
        run: pip-audit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"] # TBD: bei Multi-Version-Support erweitern
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term --cov-fail-under=80 # TBD: Schwellenwert aus project-context.md
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
